info:
  name: getLogs
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/audit/logs"
  auth:
    type: oauth2
    flow: authorization_code
    credentials:
      placement: body
    tokenConfig:
      id: credentials
      placement:
        header: Bearer
      source: access_token

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
