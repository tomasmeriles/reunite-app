info:
  name: refresh
  type: http
  seq: 4

http:
  method: POST
  url: '{{baseUrl}}/auth/refresh'
  auth: none

script:
  res: |
    const csrfToken = res.body.csrfToken;
    if (csrfToken) {
      bru.setEnvVar('csrfToken', csrfToken);
      bru.setVar('csrfToken', csrfToken);
    }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
