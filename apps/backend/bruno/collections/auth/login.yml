info:
  name: login
  type: http
  seq: 2

http:
  method: POST
  url: '{{baseUrl}}/auth/login'
  body:
    type: json
    data: |-
      {
        "email": {{email}},
        "password": {{password}}
      }
  auth: inherit

script:
  res: |
    const csrfToken = res.body.csrfToken;
    if (csrfToken) {
      bru.setEnvVar('csrfToken', csrfToken);
      bru.setVar('csrfToken', csrfToken);
    }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
