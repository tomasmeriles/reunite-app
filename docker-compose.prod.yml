# Override for production: adds backend and web as containers.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  db:
    # In production, we dont need to expose the db port to the host, as backend will connect to it internally.
    ports: !reset []

  redis:
    # In production, we don't expose Redis to the host.
    ports: !reset []

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    env_file:
      - apps/backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-5173}:3000'
    depends_on:
      - backend
